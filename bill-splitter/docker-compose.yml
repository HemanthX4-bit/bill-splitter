services:
  app1:
    build: .
    environment:
      - JWT_SECRET=dev-only-secret-change-this-in-production
    volumes:
      - dbdata:/app/data

  app2:
    build: .
    environment:
      - JWT_SECRET=dev-only-secret-change-this-in-production
    volumes:
      - dbdata:/app/data

  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2

volumes:
  dbdata:
